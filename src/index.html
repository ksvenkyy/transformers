<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Transformers</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="controller-icon.png">
</head>

<body>
  <app-root>
    <style>
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: radial-gradient(1100px 620px at 85% -10%, rgba(139, 93, 255, 0.25), transparent 62%), 
                    radial-gradient(900px 500px at 0% 20%, rgba(0, 255, 247, 0.18), transparent 58%), 
                    radial-gradient(850px 420px at 70% 90%, rgba(255, 43, 214, 0.16), transparent 55%), 
                    linear-gradient(180deg, #05060f 0%, #0a1130 52%, #060912 100%);
        background-color: #05060f;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      }
      .gs-loader-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      .gs-loader-ring {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 4px solid rgba(0, 255, 247, 0.1);
        border-top-color: #00fff7;
        border-left-color: rgba(255, 43, 214, 0.6);
        box-shadow: 0 0 25px rgba(0, 255, 247, 0.35);
        animation: gsLoadingSpin 1s cubic-bezier(0.68, -0.15, 0.265, 1.15) infinite;
      }
      .gs-loader-text {
        color: #e8efff;
        font-size: 14px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 700;
        text-shadow: 0 0 12px rgba(0, 255, 247, 0.5);
        animation: gsLoadingPulse 2s ease-in-out infinite;
      }
      @keyframes gsLoadingSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes gsLoadingPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
    <div class="gs-loader-wrapper">
      <div class="gs-loader-ring"></div>
      <div class="gs-loader-text">Initializing Systems</div>
    </div>
  </app-root>
</body>

</html>
