<div class="gs-page" role="main" aria-label="Game Station login">
  <div class="gs-bg" aria-hidden="true">
    <div class="gs-neon-glow"></div>
    <div class="gs-grid-floor"></div>
  </div>

  <div class="gs-station">
    <div class="gs-station__header">
      <img
        class="gs-login-logo"
        src="/transformers-gaming-pub-logo.png"
        alt="TRANSFORMERS GAMING PUB"
        width="420"
        height="220"
        data-testid="login-title"
      />
    </div>

    <div class="gs-card">
      <form class="gs-form" (ngSubmit)="onSubmit()" novalidate>
        <div class="gs-field">
          <label for="gs-username">Username</label>
          <input
            id="gs-username"
            name="username"
            type="text"
            autocomplete="username"
            placeholder=""
            [(ngModel)]="username"
          />
        </div>

        <div class="gs-field">
          <div class="gs-label-row">
            <label for="gs-password">Password</label>
            <button
              type="button"
              class="gs-link"
              (click)="showPassword = !showPassword"
              [attr.aria-pressed]="showPassword"
            >
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <input
            id="gs-password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            [(ngModel)]="password"
            [type]="showPassword ? 'text' : 'password'"
          />
        </div>

        <button class="gs-submit" type="submit">
          Sign in
          <span class="gs-submit__spark" aria-hidden="true"></span>
        </button>

        @if (statusMessage) {
          <div class="gs-status" role="status">{{ statusMessage }}</div>
        }
      </form>

      <div class="gs-footer">
        <div class="gs-footline">
        </div>
        <button type="button" class="gs-secondary" (click)="useDemoCredentials()">
          Use demo credentials
        </button>
      </div>
    </div>
  </div>
</div>
