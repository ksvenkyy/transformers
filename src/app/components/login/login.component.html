<div class="gs-page" role="main" aria-label="Game Station login">
  <div class="gs-bg" aria-hidden="true">
    <div class="gs-neon-glow"></div>
    <div class="gs-grid-floor"></div>
  </div>

  <div class="gs-station">
    <div class="gs-station__header">
      <img class="gs-login-logo" src="/transformers-logo-transparent.png" alt="TRANSFORMERS GAMING PUB" width="420"
        height="220" data-testid="login-title" />
    </div>

    <div class="gs-card">
      <div class="gs-form">
        <button class="gs-submit" type="button" (click)="login()">
          Sign in with SSO 🔑
        </button>
      </div>
    </div>
  </div>
</div>
